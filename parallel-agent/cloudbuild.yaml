steps:
  # 2. Despliegue 
  - name: 'python:3.10'
    id: 'Despliegue_Agent_Engine'
    dir: 'parallel-agent'
    entrypoint: /bin/bash
    args:
      - -c
      - |
        pip install google-adk
        adk deploy agent_engine \
        --project=interno-geminienterprise \
        --region=us-central1 \
        --agent_engine_id="2693689688597725184" \  
        planificador_viajes

options:
  logging: CLOUD_LOGGING_ONLY